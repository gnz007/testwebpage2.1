<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Cykeo">
  <!--
    Cykeo — Favicon
    Glifo del logo solo (sin wordmark), optimizado para 16x16 y 32x32
  -->
  <!-- Contenedor redondeado -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#0071e3"/>
  <!-- Ondas RFID concéntricas -->
  <g stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" fill="none" transform="translate(32, 38)">
    <path d="M -10 0 A 10 10 0 0 1 10 0" opacity="0.95"/>
    <path d="M -16 0 A 16 16 0 0 1 16 0" opacity="0.7"/>
    <path d="M -22 0 A 22 22 0 0 1 22 0" opacity="0.45"/>
  </g>
  <!-- Punto central -->
  <circle cx="32" cy="38" r="3" fill="#ffffff"/>
</svg>
