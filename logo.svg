<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none" role="img" aria-label="Cykeo Argentina">
  <!--
    Cykeo Argentina — Logo
    Glifo: ondas RFID concéntricas dentro de un cuadrado redondeado (senal + almacenamiento)
    Wordmark: "Cykeo" en sans-serif geometrico, peso 600, tracking ajustado
    Estilo: minimalista, monocromo, inspiracion Apple/Linear
  -->
  <defs>
    <style>
      .ck-word { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 600; font-size: 32px; letter-spacing: -0.02em; fill: #1d1d1f; }
      .ck-ar-arg { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 400; font-size: 12px; letter-spacing: 0.12em; fill: #0071e3; }
    </style>
  </defs>

  <!-- Glifo: cuadrado redondeado con ondas RFID -->
  <g transform="translate(8, 8)">
    <!-- Contenedor redondeado (radio 14px estilo Apple) -->
    <rect x="0" y="0" width="64" height="64" rx="14" fill="#0071e3"/>
    <!-- Ondas RFID: 3 arcos concentricos emanando del centro inferior -->
    <g stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" fill="none" transform="translate(32, 38)">
      <!-- Arco interno (mas grueso, mas opaco) -->
      <path d="M -10 0 A 10 10 0 0 1 10 0" opacity="0.95"/>
      <!-- Arco medio -->
      <path d="M -16 0 A 16 16 0 0 1 16 0" opacity="0.7"/>
      <!-- Arco externo (mas fino, mas transparente) -->
      <path d="M -22 0 A 22 22 0 0 1 22 0" opacity="0.45"/>
    </g>
    <!-- Punto central (nodo/emisor) -->
    <circle cx="32" cy="38" r="3" fill="#ffffff"/>
  </g>

  <!-- Wordmark -->
  <text x="92" y="44" class="ck-word">Cykeo</text>

  <!-- Eyebrow: ARGENTINA -->
  <text x="93" y="62" class="ck-ar-arg">ARGENTINA</text>
</svg>
